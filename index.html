<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gubb Chat </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="script/firebaseconfig.js" type="module" defer></script>
  <script src="script/theme.js" defer></script>
  <!-- google fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-main">
    <div class="container">
      <header class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom">
        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-dark text-decoration-none">
          <!-- <svg class="bi me-2" width="40" height="32"><use xlink:href="#bootstrap"></use></svg> -->
          <span class="fs-2 bitcount-prop-double burnt-peach">Gubb Chat</span>
        </a>

        <ul class="nav nav-pills align-items-center">
          <li class="nav-item"><a href="index.html" class="nav-link active" aria-current="page">Home</a></li>
          <li class="nav-item"><a href="contact.html" class="nav-link">Contact us</a></li>
          <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
          <li class="nav-item ms-2" id="loginItem"><button id="loginBtn" class="btn btn-outline-secondary btn-sm">Sign in with Google</button></li>
          <li class="nav-item ms-2" id="signedInItem" style="display:none"><span id="signedInLabel" class="navbar-text small"></span></li>
          <li class="nav-item ms-2" id="logoutItem" style="display:none"><button id="logoutBtn" class="btn btn-outline-danger btn-sm">Sign out</button></li>
          <li class="nav-item ms-2">
            <button id="themeToggle" class="btn btn-burnt-peach btn-sm" type="button">Light mode</button>
          </li>
        </ul>
      </header>
    </div>
  </div>
  <div class="container">
     <h1 class="white">💬 Gubb Chat</h1>

    <form id="chatForm" class="row g-2 align-items-center mb-3">
      <div class="col-12 col-md-3" id="usernameCol">
        <label for="usernameInput" class="form-label visually-hidden">Your name</label>
        <input type="text" id="usernameInput" class="form-control" placeholder="Your name" autocomplete="name" required>
      </div>
      <div class="col-12 col-md-7">
        <label for="messageInput" class="form-label visually-hidden">Write a message</label>
        <input type="text" id="messageInput" class="form-control" placeholder="Write a message..." required>
      </div>
      <div class="col-12 col-md-2 d-grid">
        <button id="postBtn" type="submit" class="btn btn-burnt-peach">Post</button>
      </div>
    </form>

    <div id="messagesList" class="messages list-group list-group-flush mb-3"></div>
  </div>

  <div id="deleteZone">🗑️ Dra hit för att ta bort</div>

    <div class="container">
  <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top">
    <div class="col-md-6 d-flex align-items-center">
      <span class="text-muted">&copy; 2026 Gubb Chat</span>
    </div>

    <ul class="nav col-md-6 justify-content-end list-unstyled d-flex footer-social">
      <li class="ms-3"><a class="text-muted" href="#" aria-label="Follow us on X"><i class="bi bi-twitter-x"></i></a></li>
      <li class="ms-3"><a class="text-muted" href="#" aria-label="Follow us on Instagram"><i class="bi bi-instagram"></i></a></li>
      <li class="ms-3"><a class="text-muted" href="#" aria-label="Follow us on Facebook"><i class="bi bi-facebook"></i></a></li>
    </ul>
  </footer>
</div>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
